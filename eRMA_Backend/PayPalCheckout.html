<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
</head>
<body>
    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AdphsgsB0AE9ykwwxzv3X8OZp3L3c-ArKvIU5df5Jw8nKCk1ZRaMnyjz9WB6J18HJIHOyK3IJg2tcQ_X"></script>
    <script>
        paypal.Buttons({
            createOrder: function (data, actions) {

                var sAmt = location.search.replace('?sAmt=', '');

                const chars = sAmt.split('|');

                return actions.order.create({

                    purchase_units: [{
                        amount: {
                            "cancel_url": "https://e-rma.cipherlab.com.tw/Client_FlowCase01_Worklist.aspx",
                            currency_code: "USD",
                            value: chars[0]
                        }

                    }]
                })

            },
            onApprove: function (data, actions) {
                return actions.order.capture().then(function (details) {

                    var sAmt = location.search.replace('?sAmt=', '');
                    const chars = sAmt.split('|');

                    console.log(details),
                        window.location.
                            replace(chars[1]);
                })
            }
        }).render('#paypal-button-container')
    </script>
</body>
</html>
